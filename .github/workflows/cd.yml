name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          KEY_FILE="$(mktemp)"
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          ssh -T -o ConnectTimeout=20 -o StrictHostKeyChecking=no -i "$KEY_FILE" ubuntu@ec2-54-243-17-197.compute-1.amazonaws.com << 'EOF'
          cd ~/mern-crud-app
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
          docker ps
          EOF

          rm -f "$KEY_FILE"