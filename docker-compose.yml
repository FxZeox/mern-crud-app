services:
  backend:
    image: mrusman1/mern-backend:latest
    build: ./server
    container_name: mern-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    networks:
      - mern-net

  frontend:
    image: mrusman1/mern-frontend:latest
    build: ./client
    container_name: mern-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mern-net

networks:
  mern-net:
